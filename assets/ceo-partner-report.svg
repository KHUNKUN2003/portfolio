<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1600" viewBox="0 0 750 1600" role="img" aria-labelledby="title desc">
  <title id="title">CEO Partner daily report chat</title>
  <desc id="desc">A LINE dark-mode chat showing a CEO Partner daily performance report.</desc>
  <rect width="750" height="1600" fill="#111"/>
  <rect width="750" height="92" fill="#101010"/>
  <path d="M54 28 24 58l30 30" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="86" y="65" fill="#fff" font-family="Arial, sans-serif" font-size="42" font-weight="800">99+</text>
  <text x="216" y="65" fill="#fff" font-family="Arial, sans-serif" font-size="42" font-weight="800">CEO Partner</text>
  <circle cx="52" cy="148" r="38" fill="#ff553e"/>
  <text x="30" y="158" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="900">CEO</text>
  <rect x="96" y="116" width="594" height="1370" rx="28" fill="#2b2b2b"/>
  <text x="132" y="170" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34" font-weight="700">รายงานผลการดำเนินงานของเพจ</text>
  <text x="132" y="218" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">Fulltank Garage : ศูนย์ติดตั้ง</text>
  <text x="132" y="266" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">ฟิล์มกรองแสง สาขา กาญจนาภิเษก</text>
  <text x="132" y="314" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">ประจำวันที่ 7 มิถุนายน 2026 ครับ</text>
  <text x="132" y="410" fill="#fff" font-family="Arial, sans-serif" font-size="34">---</text>
  <text x="132" y="502" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="36" font-weight="800">1. ภาพรวมผลลัพธ์โฆษณา</text>
  <text x="132" y="552" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">(Ad Performance)</text>
  <text x="132" y="610" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">วันนี้มีการรันโฆษณา 3 ชุด</text>
  <text x="132" y="660" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">จาก 2 แคมเปญ โดยมีรายละเอียด:</text>
  <text x="132" y="756" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">• ยอดเงินที่ใช้ทั้งหมด</text>
  <text x="156" y="804" fill="#fff" font-family="Arial, sans-serif" font-size="36" font-weight="800">609.48 บาท</text>
  <text x="132" y="868" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">• การเข้าถึงทั้งหมด 3,095 คน</text>
  <text x="132" y="928" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">• ยอดแสดงผล 3,685 ครั้ง</text>
  <text x="132" y="988" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">• คลิกทั้งหมด 170 ครั้ง</text>
  <text x="132" y="1048" fill="#fff" font-family="Arial, sans-serif" font-size="34">CTR เฉลี่ยดีมากที่ 4.61%</text>
  <text x="132" y="1112" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">• ข้อความใหม่ 8 ข้อความ</text>
  <text x="132" y="1172" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">• Cost per Conversation</text>
  <text x="156" y="1220" fill="#fff" font-family="Arial, sans-serif" font-size="36" font-weight="800">76.19 บาท</text>
  <text x="132" y="1324" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34" font-weight="800">เจาะลึกแต่ละชุดโฆษณา:</text>
  <text x="132" y="1380" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">แคมเปญแอดลด 60% ลำเนา</text>
  <text x="132" y="1434" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">งบที่ใช้ 307.92 บาท คลิก 119 ครั้ง</text>
  <rect x="641" y="1324" width="66" height="74" rx="12" fill="#333"/>
  <path d="M674 1342v34m0 0 16-16m-16 16-16-16" fill="none" stroke="#bbb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect y="1498" width="750" height="102" fill="#0f0f0f"/>
  <path d="M36 1548h58m-29-29v58M132 1518h62v62h-62zM238 1518h64v62h-64z" fill="none" stroke="#ddd" stroke-width="5" stroke-linecap="round"/>
  <rect x="338" y="1518" width="248" height="62" rx="31" fill="#222"/>
  <text x="410" y="1558" fill="#777" font-family="Arial, sans-serif" font-size="32">Aa</text>
</svg>
