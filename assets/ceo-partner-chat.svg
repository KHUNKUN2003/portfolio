  <rect x="96" y="206" width="594" height="1245" rx="28" fill="#2b2b2b"/>
  <text x="132" y="266" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">สวัสดีครับ! สำหรับวันนี้ เพื่อให้ร้าน</text>
  <text x="132" y="314" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">Fulltank Garage ทำงานได้อย่างมี</text>
