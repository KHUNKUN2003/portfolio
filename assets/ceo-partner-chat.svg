  <text x="132" y="410" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">แอดมินสรุปสิ่งที่ควรทำให้ครับ:</text>
  <text x="132" y="520" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="36" font-weight="800">1. ตอบแชทลูกค้าค้างตอบด่วนที่สุด</text>
  <text x="132" y="578" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">มีลูกค้า 2 ท่านที่ทักเข้ามาเมื่อคืน</text>
  <text x="132" y="626" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">และยังรอคำตอบจากคุณอยู่ครับ</text>
  <text x="132" y="704" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">คุณ Chane Rachane: ถามถึงรถ</text>
  <text x="132" y="752" fill="#fff" font-family="Arial, sans-serif" font-size="34">Altis 2014</text>
  <text x="156" y="824" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">สิ่งที่ต้องทำ: ส่งราคาแนะนำ</text>
  <text x="156" y="874" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">สำหรับรถเก๋งขนาดกลาง เช่น</text>
  <text x="184" y="940" fill="#fff" font-family="Arial, sans-serif" font-size="34">1. SolarKey Eco Ceramic</text>
  <text x="184" y="990" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">ราคาประมาณ 4,500 - 5,500</text>
  <text x="184" y="1056" fill="#fff" font-family="Arial, sans-serif" font-size="34">2. SolarKey Ultra IR</text>
  <text x="184" y="1106" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">ราคาประมาณ 6,500</text>
  <text x="184" y="1172" fill="#fff" font-family="Arial, sans-serif" font-size="34">3. Hi-Kool Beyond Ceramic</text>
  <text x="184" y="1222" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">ราคาประมาณ 8,500</text>
  <text x="132" y="1320" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">ทริค: ถามความต้องการเพิ่มว่า</text>
  <text x="132" y="1370" fill="#fff" font-family="Arial, 'Noto Sans Thai', sans-serif" font-size="34">ชอบฟิล์มใสหรือเข้มกี่เปอร์เซ็นต์</text>
